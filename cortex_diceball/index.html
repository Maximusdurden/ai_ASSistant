<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex Diceball</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #282c34;
            color: #e0e0e0;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            flex-direction: column;
        }

        .game-container {
            background-color: #3a404a;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 90%;
            width: 450px;
        }

        h1 {
            color: #61dafb;
            margin-bottom: 20px;
            font-size: 2.2em;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #2f343c;
            border-radius: 8px;
        }

        .score-item {
            text-align: center;
        }

        .score-item h2 {
            margin: 0;
            font-size: 1.1em;
            color: #bbbbbb;
        }

        .score-item p {
            margin: 5px 0 0;
            font-size: 1.8em;
            font-weight: bold;
            color: #61dafb;
        }

        #dice-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .die {
            width: 70px;
            height: 70px;
            background-color: #fff;
            border: 3px solid #4caf50;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        #roll-button {
            padding: 12px 25px;
            font-size: 1.3em;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-bottom: 20px;
        }

        #roll-button:hover:not(:disabled) {
            background-color: #43a047;
            transform: translateY(-2px);
        }

        #roll-button:disabled {
            background-color: #66bb6a;
            cursor: not-allowed;
            opacity: 0.7;
        }

        #bases-container {
            display: grid;
            grid-template-areas:
                ". second ."
                "third . first"
                ". home .";
            gap: 5px;
            width: 180px; /* Diamond shape */
            height: 180px;
            margin: 0 auto 25px;
            position: relative;
            transform: rotate(45deg);
        }

        .base {
            width: 50px;
            height: 50px;
            background-color: #555c66;
            border: 2px solid #61dafb;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8em;
            color: #e0e0e0;
            border-radius: 5px; /* Slightly rounded for bases */
            position: relative;
            transform: rotate(-45deg); /* Counter-rotate text */
        }
        .base.occupied {
            background-color: #ffeb3b;
            border-color: #fbc02d;
            color: #333;
            font-weight: bold;
        }

        #first-base { grid-area: first; }
        #second-base { grid-area: second; }
        #third-base { grid-area: third; }
        #home-plate {
            grid-area: home;
            background-color: #ff1744;
            border-color: #d50000;
            color: white;
            font-weight: bold;
        }

        #game-log {
            background-color: #2f343c;
            padding: 15px;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
            font-size: 0.9em;
            color: #bbbbbb;
            margin-top: 20px;
        }

        #game-log p {
            margin: 5px 0;
            border-bottom: 1px dashed #4a505c;
            padding-bottom: 5px;
        }
        #game-log p:last-child {
            border-bottom: none;
        }

        .message-inning {
            color: #61dafb;
            font-weight: bold;
        }
        .message-event {
            color: #4caf50;
        }
        .message-out {
            color: #ff1744;
        }
        .message-run {
            color: #ffeb3b;
            font-weight: bold;
        }
        .message-game-end {
            color: #fff;
            font-weight: bold;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Cortex Diceball</h1>

        <div class="scoreboard">
            <div class="score-item">
                <h2>Player Score</h2>
                <p id="player-total-score">0</p>
            </div>
            <div class="score-item">
                <h2>Computer Score</h2>
                <p id="computer-total-score">0</p>
            </div>
        </div>

        <div class="scoreboard">
            <div class="score-item">
                <h2>Inning</h2>
                <p id="current-inning">1</p>
            </div>
            <div class="score-item">
                <h2>Outs</h2>
                <p id="current-outs">0</p>
            </div>
            <div class="score-item">
                <h2>Runs (Inning)</h2>
                <p id="inning-runs">0</p>
            </div>
        </div>

        <div id="dice-container">
            <div class="die" id="die1">1</div>
            <div class="die" id="die2">1</div>
        </div>

        <button id="roll-button">Roll Dice</button>

        <div id="bases-container">
            <div class="base" id="first-base">1st</div>
            <div class="base" id="second-base">2nd</div>
            <div class="base" id="third-base">3rd</div>
            <div class="base" id="home-plate">Home</div>
        </div>

        <div id="game-log"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const die1Element = document.getElementById('die1');
            const die2Element = document.getElementById('die2');
            const rollButton = document.getElementById('roll-button');
            const currentInningElement = document.getElementById('current-inning');
            const currentOutsElement = document.getElementById('current-outs');
            const inningRunsElement = document.getElementById('inning-runs');
            const playerTotalScoreElement = document.getElementById('player-total-score');
            const computerTotalScoreElement = document.getElementById('computer-total-score');
            const firstBaseElement = document.getElementById('first-base');
            const secondBaseElement = document.getElementById('second-base');
            const thirdBaseElement = document.getElementById('third-base');
            const gameLogElement = document.getElementById('game-log');

            const MAX_INNINGS = 9;

            let gameState = {
                inning: 1,
                isPlayerTurn: true,
                outs: 0,
                inningRuns: 0,
                bases: [false, false, false], // [1st, 2nd, 3rd]
                playerScore: 0,
                computerScore: 0,
                gameOver: false
            };

            const logMessage = (message, type = '') => {
                const p = document.createElement('p');
                p.innerHTML = message;
                if (type) p.classList.add(type);
                gameLogElement.prepend(p); // Add to top
                if (gameLogElement.children.length > 20) { // Keep log manageable
                    gameLogElement.removeChild(gameLogElement.lastChild);
                }
            };

            const updateUI = () => {
                currentInningElement.textContent = `${gameState.inning} (${gameState.isPlayerTurn ? 'Player' : 'Computer'})`;
                currentOutsElement.textContent = gameState.outs;
                inningRunsElement.textContent = gameState.inningRuns;
                playerTotalScoreElement.textContent = gameState.playerScore;
                computerTotalScoreElement.textContent = gameState.computerScore;

                firstBaseElement.classList.toggle('occupied', gameState.bases[0]);
                secondBaseElement.classList.toggle('occupied', gameState.bases[1]);
                thirdBaseElement.classList.toggle('occupied', gameState.bases[2]);

                rollButton.disabled = gameState.gameOver;
                if (gameState.gameOver) {
                    rollButton.textContent = 'Game Over';
                }
            };

            const resetInning = () => {
                gameState.outs = 0;
                gameState.inningRuns = 0;
                gameState.bases = [false, false, false];
                updateUI();
            };

            const advanceRunners = (eventText) => {
                let runsScoredThisPlay = 0;

                // Helper to score a runner
                const scoreRunner = (baseNum) => {
                    if (gameState.bases[baseNum - 1]) {
                        runsScoredThisPlay++;
                        gameState.inningRuns++;
                        logMessage(`<span class="message-run">A runner scored from ${baseNum}st/nd/rd base!</span>`, 'message-run');
                    }
                };

                // Advance based on event
                switch (eventText) {
                    case 'Home Run':
                        scoreRunner(3); scoreRunner(2); scoreRunner(1); // Clear bases
                        runsScoredThisPlay++; // Batter scores
                        gameState.inningRuns++;
                        gameState.bases = [false, false, false]; // Bases cleared
                        logMessage(`<span class="message-run">HOME RUN!</span>`, 'message-run');
                        break;
                    case 'Triple':
                        scoreRunner(3); scoreRunner(2); scoreRunner(1);
                        gameState.bases = [false, false, true]; // Batter on 3rd
                        break;
                    case 'Double':
                        scoreRunner(3); scoreRunner(2);
                        gameState.bases = [false, true, false]; // Batter on 2nd
                        if (gameState.bases[0]) gameState.bases[2] = true; // 1st to 3rd
                        break;
                    case 'Single':
                    case 'Walk': // Walk has same base advancement as single in Diceball
                        scoreRunner(3); // 3rd scores
                        if (gameState.bases[1]) gameState.bases[2] = true; // 2nd to 3rd
                        if (gameState.bases[0]) gameState.bases[1] = true; // 1st to 2nd
                        gameState.bases[0] = true; // Batter on 1st
                        break;
                }
                // Update total score after inningRuns are calculated
                if (gameState.isPlayerTurn) {
                    gameState.playerScore += runsScoredThisPlay;
                } else {
                    gameState.computerScore += runsScoredThisPlay;
                }
                updateUI();
            };

            const handleRollOutcome = (die1, die2) => {
                const sum = die1 + die2;
                let eventText = '';
                let outsToAdd = 0;

                if (die1 === die2) { // Doubles
                    switch (die1) {
                        case 1: // Snake Eyes
                            eventText = 'Triple Play!';
                            outsToAdd = 3;
                            break;
                        case 2:
                            eventText = 'Double Play!';
                            outsToAdd = 2;
                            break;
                        case 3:
                            eventText = 'Home Run!';
                            advanceRunners(eventText);
                            break;
                        case 4:
                            eventText = 'Triple!';
                            advanceRunners(eventText);
                            break;
                        case 5:
                            eventText = 'Double!';
                            advanceRunners(eventText);
                            break;
                        case 6:
                            eventText = 'Walk!'; // Acts like a single for base advancement
                            advanceRunners(eventText);
                            break;
                    }
                } else { // Non-doubles
                    switch (sum) {
                        case 7:
                            eventText = 'Single!';
                            advanceRunners(eventText);
                            break;
                        case 8:
                        case 9:
                        case 10:
                        case 11:
                            eventText = 'Out!';
                            outsToAdd = 1;
                            break;
                        case 12:
                            eventText = 'Home Run!';
                            advanceRunners(eventText);
                            break;
                    }
                }

                logMessage(`${gameState.isPlayerTurn ? 'Player' : 'Computer'} rolled ${die1} and ${die2}. Result: <span class="message-event">${eventText}</span>`);

                gameState.outs += outsToAdd;
                if (outsToAdd > 0) {
                    logMessage(`<span class="message-out">${outsToAdd} out${outsToAdd > 1 ? 's' : ''} added! Total outs: ${gameState.outs}</span>`, 'message-out');
                }

                updateUI();

                if (gameState.outs >= 3) {
                    endBattingTurn();
                }
            };

            const endBattingTurn = () => {
                logMessage(`<span class="message-inning">${gameState.isPlayerTurn ? 'Player' : 'Computer'}'s turn ends. ${gameState.inningRuns} runs scored this inning.</span>`, 'message-inning');
                resetInning();
                gameState.isPlayerTurn = !gameState.isPlayerTurn;

                if (gameState.isPlayerTurn === false && gameState.inning <= MAX_INNINGS) {
                    // It's the computer's turn, make it roll automatically
                    logMessage(`<span class="message-inning">--- Computer's Turn (Inning ${gameState.inning}) ---</span>`, 'message-inning');
                    setTimeout(computerTurn, 1500); // Give a slight delay for readability
                } else if (gameState.isPlayerTurn === true && gameState.inning < MAX_INNINGS) {
                    gameState.inning++;
                    logMessage(`<span class="message-inning">--- Player's Turn (Inning ${gameState.inning}) ---</span>`, 'message-inning');
                    updateUI();
                } else if (gameState.isPlayerTurn === false && gameState.inning > MAX_INNINGS) {
                    // Both teams finished 9 innings
                    endGame();
                } else if (gameState.isPlayerTurn === true && gameState.inning === MAX_INNINGS && !gameState.gameOver) {
                    // Player's last turn in 9th inning
                    logMessage(`<span class="message-inning">--- Player's Final Turn (Inning ${gameState.inning}) ---</span>`, 'message-inning');
                    updateUI();
                }
                 // Special case: If it's the bottom of the 9th and computer has higher score, end game
                if (gameState.inning === MAX_INNINGS && gameState.isPlayerTurn === false && gameState.computerScore > gameState.playerScore) {
                    endGame();
                }
            };

            const computerTurn = () => {
                if (gameState.gameOver || gameState.outs >= 3) return; // Should not happen if called correctly

                const die1 = Math.floor(Math.random() * 6) + 1;
                const die2 = Math.floor(Math.random() * 6) + 1;
                die1Element.textContent = die1;
                die2Element.textContent = die2;

                handleRollOutcome(die1, die2);

                if (gameState.outs < 3 && !gameState.gameOver) {
                    setTimeout(computerTurn, 2000); // Continue computer's turn after a delay
                }
            };

            const endGame = () => {
                gameState.gameOver = true;
                let finalMessage = 'Game Over! ';
                if (gameState.playerScore > gameState.computerScore) {
                    finalMessage += `Player Wins with ${gameState.playerScore} to ${gameState.computerScore}!`;
                } else if (gameState.computerScore > gameState.playerScore) {
                    finalMessage += `Computer Wins with ${gameState.computerScore} to ${gameState.playerScore}!`;
                } else {
                    finalMessage += `It's a Tie! ${gameState.playerScore} to ${gameState.computerScore}.`;
                }
                logMessage(`<span class="message-game-end">${finalMessage}</span>`, 'message-game-end');
                alert(finalMessage);
                updateUI();
            };

            rollButton.addEventListener('click', () => {
                if (gameState.gameOver || !gameState.isPlayerTurn) return;

                const die1 = Math.floor(Math.random() * 6) + 1;
                const die2 = Math.floor(Math.random() * 6) + 1;
                die1Element.textContent = die1;
                die2Element.textContent = die2;

                handleRollOutcome(die1, die2);
            });

            // Initial setup
            logMessage(`<span class="message-inning">--- Player's Turn (Inning 1) ---</span>`, 'message-inning');
            updateUI();
        });
    </script>
</body>
</html>
