<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex Yahtzee</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #282c34;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-container {
            background-color: #3a404a;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 90%;
            width: 700px;
        }

        h1 {
            color: #61dafb;
            margin-bottom: 25px;
            font-size: 2.5em;
        }

        #dice-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .die {
            width: 70px;
            height: 70px;
            background-color: #fff;
            border: 3px solid #61dafb;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s, transform 0.1s;
        }

        .die:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        .die.locked {
            background-color: #ffeb3b;
            border-color: #fbc02d;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.3);
        }

        #roll-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        #roll-button {
            padding: 12px 25px;
            font-size: 1.3em;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-bottom: 15px;
        }

        #roll-button:hover:not(:disabled) {
            background-color: #43a047;
            transform: translateY(-2px);
        }

        #roll-button:disabled {
            background-color: #66bb6a;
            cursor: not-allowed;
            opacity: 0.7;
        }

        #rolls-left {
            font-size: 1.1em;
            color: #bbbbbb;
        }

        #scorecard {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #2f343c;
            border-radius: 8px;
            overflow: hidden;
        }

        #scorecard th, #scorecard td {
            padding: 12px 15px;
            border: 1px solid #4a505c;
            text-align: left;
        }

        #scorecard th {
            background-color: #555c66;
            color: #61dafb;
            font-size: 1.1em;
        }

        #scorecard td {
            color: #e0e0e0;
        }

        .score-category {
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .score-category:hover:not(.assigned) {
            background-color: #4a505c;
        }

        .score-category.assigned {
            background-color: #555c66;
            color: #a0a0a0;
            cursor: not-allowed;
        }

        .potential-score {
            font-weight: bold;
            color: #ffeb3b;
        }

        .total-row th, .total-row td {
            font-weight: bold;
            background-color: #3f454e;
            color: #61dafb;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Cortex Yahtzee</h1>

        <div id="dice-container">
            <div class="die" id="die0"></div>
            <div class="die" id="die1"></div>
            <div class="die" id="die2"></div>
            <div class="die" id="die3"></div>
            <div class="die" id="die4"></div>
        </div>

        <div id="roll-section">
            <button id="roll-button">Roll Dice</button>
            <p id="rolls-left">Rolls left: 3</p>
        </div>

        <table id="scorecard">
            <thead>
                <tr>
                    <th>Category</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody>
                <!-- Upper Section -->
                <tr id="score-ones" class="score-category">
                    <td>Ones</td>
                    <td data-category="ones"></td>
                </tr>
                <tr id="score-twos" class="score-category">
                    <td>Twos</td>
                    <td data-category="twos"></td>
                </tr>
                <tr id="score-threes" class="score-category">
                    <td>Threes</td>
                    <td data-category="threes"></td>
                </tr>
                <tr id="score-fours" class="score-category">
                    <td>Fours</td>
                    <td data-category="fours"></td>
                </tr>
                <tr id="score-fives" class="score-category">
                    <td>Fives</td>
                    <td data-category="fives"></td>
                </tr>
                <tr id="score-sixes" class="score-category">
                    <td>Sixes</td>
                    <td data-category="sixes"></td>
                </tr>
                <tr class="total-row">
                    <th>Upper Total</th>
                    <td id="upper-total">0</td>
                </tr>
                <tr class="total-row">
                    <th>Bonus (63+)</th>
                    <td id="bonus-score">0</td>
                </tr>

                <!-- Lower Section -->
                <tr id="score-three-of-a-kind" class="score-category">
                    <td>3 of a Kind</td>
                    <td data-category="threeOfAKind"></td>
                </tr>
                <tr id="score-four-of-a-kind" class="score-category">
                    <td>4 of a Kind</td>
                    <td data-category="fourOfAKind"></td>
                </tr>
                <tr id="score-full-house" class="score-category">
                    <td>Full House (25)</td>
                    <td data-category="fullHouse"></td>
                </tr>
                <tr id="score-small-straight" class="score-category">
                    <td>Small Straight (30)</td>
                    <td data-category="smallStraight"></td>
                </tr>
                <tr id="score-large-straight" class="score-category">
                    <td>Large Straight (40)</td>
                    <td data-category="largeStraight"></td>
                </tr>
                <tr id="score-yahtzee" class="score-category">
                    <td>Yahtzee (50)</td>
                    <td data-category="yahtzee"></td>
                </tr>
                <tr id="score-chance" class="score-category">
                    <td>Chance</td>
                    <td data-category="chance"></td>
                </tr>
                <tr class="total-row">
                    <th>Lower Total</th>
                    <td id="lower-total">0</td>
                </tr>
                <tr class="total-row">
                    <th>Grand Total</th>
                    <td id="grand-total">0</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const diceElements = Array.from(document.querySelectorAll('.die'));
            const rollButton = document.getElementById('roll-button');
            const rollsLeftElement = document.getElementById('rolls-left');
            const scorecardTable = document.getElementById('scorecard');

            let diceValues = [0, 0, 0, 0, 0];
            let lockedDice = [false, false, false, false, false];
            let rollsLeft = 3;
            let currentTurn = 1;
            const maxTurns = 13; // 13 categories
            let scores = {
                'ones': null, 'twos': null, 'threes': null, 'fours': null, 'fives': null, 'sixes': null,
                'threeOfAKind': null, 'fourOfAKind': null, 'fullHouse': null, 'smallStraight': null,
                'largeStraight': null, 'yahtzee': null, 'chance': null
            };

            // --- Game Initialization & Reset ---
            const initGame = () => {
                resetTurn();
                updateScorecardDisplay();
                updateTotals();
            };

            const resetTurn = () => {
                diceValues = [0, 0, 0, 0, 0];
                lockedDice = [false, false, false, false, false];
                rollsLeft = 3;
                diceElements.forEach((die, index) => {
                    die.textContent = '';
                    die.classList.remove('locked');
                });
                updateRollsLeftDisplay();
                rollButton.disabled = false;
                clearPotentialScores();
            };

            const updateRollsLeftDisplay = () => {
                rollsLeftElement.textContent = `Rolls left: ${rollsLeft}`;
            };

            const clearPotentialScores = () => {
                scorecardTable.querySelectorAll('td[data-category]').forEach(td => {
                    if (scores[td.dataset.category] === null) {
                        td.textContent = '';
                        td.classList.remove('potential-score');
                    }
                });
            };

            // --- Dice Rolling ---
            const rollDice = () => {
                if (rollsLeft === 0) return;

                rollsLeft--;
                updateRollsLeftDisplay();

                diceElements.forEach((die, index) => {
                    if (!lockedDice[index]) {
                        const randomNumber = Math.floor(Math.random() * 6) + 1;
                        diceValues[index] = randomNumber;
                        die.textContent = randomNumber;
                    }
                });

                if (rollsLeft === 0) {
                    rollButton.disabled = true;
                }
                updatePotentialScores();
            };

            const toggleLock = (index) => {
                if (rollsLeft === 3) return; // Cannot lock before first roll
                lockedDice[index] = !lockedDice[index];
                diceElements[index].classList.toggle('locked', lockedDice[index]);
            };

            // --- Scoring Logic ---

            // Helper to count frequencies of dice values
            const getCounts = (dice) => {
                const counts = {};
                dice.forEach(die => {
                    counts[die] = (counts[die] || 0) + 1;
                });
                return counts;
            };

            // Upper Section Scores
            const getNumberScore = (number, dice) => {
                return dice.filter(die => die === number).length * number;
            };

            // Lower Section Scores
            const getThreeOfAKindScore = (dice) => {
                const counts = getCounts(dice);
                if (Object.values(counts).some(count => count >= 3)) {
                    return dice.reduce((sum, die) => sum + die, 0);
                }
                return 0;
            };

            const getFourOfAKindScore = (dice) => {
                const counts = getCounts(dice);
                if (Object.values(counts).some(count => count >= 4)) {
                    return dice.reduce((sum, die) => sum + die, 0);
                }
                return 0;
            };

            const getFullHouseScore = (dice) => {
                const counts = getCounts(dice);
                const values = Object.values(counts);
                if ((values.includes(2) && values.includes(3)) || (values.includes(5))) { // Yahtzee also counts as Full House
                    return 25;
                }
                return 0;
            };

            const getStraightScore = (dice, length) => {
                const uniqueSortedDice = Array.from(new Set(dice)).sort((a, b) => a - b);
                if (uniqueSortedDice.length < length) return 0;

                // Check for small straight (4 consecutive)
                for (let i = 0; i <= uniqueSortedDice.length - length; i++) {
                    let consecutive = true;
                    for (let j = 0; j < length - 1; j++) {
                        if (uniqueSortedDice[i + j + 1] !== uniqueSortedDice[i + j] + 1) {
                            consecutive = false;
                            break;
                        }
                    }
                    if (consecutive) return length === 4 ? 30 : 40; // Small Straight (4) or Large Straight (5)
                }
                return 0;
            };


            const getYahtzeeScore = (dice) => {
                const counts = getCounts(dice);
                return Object.values(counts).includes(5) ? 50 : 0;
            };

            const getChanceScore = (dice) => {
                return dice.reduce((sum, die) => sum + die, 0);
            };

            const calculateCategoryScore = (category, dice) => {
                switch (category) {
                    case 'ones': return getNumberScore(1, dice);
                    case 'twos': return getNumberScore(2, dice);
                    case 'threes': return getNumberScore(3, dice);
                    case 'fours': return getNumberScore(4, dice);
                    case 'fives': return getNumberScore(5, dice);
                    case 'sixes': return getNumberScore(6, dice);
                    case 'threeOfAKind': return getThreeOfAKindScore(dice);
                    case 'fourOfAKind': return getFourOfAKindScore(dice);
                    case 'fullHouse': return getFullHouseScore(dice);
                    case 'smallStraight': return getStraightScore(dice, 4);
                    case 'largeStraight': return getStraightScore(dice, 5);
                    case 'yahtzee': return getYahtzeeScore(dice);
                    case 'chance': return getChanceScore(dice);
                    default: return 0;
                }
            };

            const updatePotentialScores = () => {
                clearPotentialScores(); // Clear previous potential scores
                if (rollsLeft === 3) return; // Don't show potential scores before first roll

                scorecardTable.querySelectorAll('td[data-category]').forEach(td => {
                    const category = td.dataset.category;
                    if (scores[category] === null) { // Only update if not yet assigned
                        const potential = calculateCategoryScore(category, diceValues);
                        td.textContent = potential;
                        td.classList.add('potential-score');
                    }
                });
            };

            const assignScore = (category) => {
                if (scores[category] !== null || rollsLeft === 3) return; // Already assigned or no rolls made yet

                const score = calculateCategoryScore(category, diceValues);
                scores[category] = score;

                // Update UI
                const tdElement = scorecardTable.querySelector(`td[data-category="${category}"]`);
                tdElement.textContent = score;
                tdElement.classList.remove('potential-score');
                tdElement.parentNode.classList.add('assigned'); // Mark row as assigned

                updateTotals();
                currentTurn++;
                if (currentTurn > maxTurns) {
                    endGame();
                } else {
                    resetTurn();
                }
            };

            const updateTotals = () => {
                let upperScore = 0;
                let lowerScore = 0;

                // Calculate Upper Section Total
                ['ones', 'twos', 'threes', 'fours', 'fives', 'sixes'].forEach(category => {
                    if (scores[category] !== null) {
                        upperScore += scores[category];
                    }
                });
                document.getElementById('upper-total').textContent = upperScore;

                // Calculate Bonus
                const bonus = upperScore >= 63 ? 35 : 0;
                document.getElementById('bonus-score').textContent = bonus;

                // Calculate Lower Section Total
                ['threeOfAKind', 'fourOfAKind', 'fullHouse', 'smallStraight', 'largeStraight', 'yahtzee', 'chance'].forEach(category => {
                    if (scores[category] !== null) {
                        lowerScore += scores[category];
                    }
                });
                document.getElementById('lower-total').textContent = lowerScore;

                // Grand Total
                const grandTotal = upperScore + bonus + lowerScore;
                document.getElementById('grand-total').textContent = grandTotal;
            };

            const updateScorecardDisplay = () => {
                for (const category in scores) {
                    const tdElement = scorecardTable.querySelector(`td[data-category="${category}"]`);
                    if (scores[category] !== null) {
                        tdElement.textContent = scores[category];
                        tdElement.parentNode.classList.add('assigned');
                    } else {
                        tdElement.textContent = '';
                        tdElement.parentNode.classList.remove('assigned');
                    }
                }
            };

            const endGame = () => {
                alert(`Game Over! Your final score is ${document.getElementById('grand-total').textContent}`);
                rollButton.disabled = true;
                // Optionally, add a restart button or prompt
            };


            // --- Event Listeners ---
            rollButton.addEventListener('click', rollDice);

            diceElements.forEach((die, index) => {
                die.addEventListener('click', () => toggleLock(index));
            });

            scorecardTable.addEventListener('click', (event) => {
                let target = event.target;
                // If clicked on the text inside td, get the td
                if (target.tagName === 'SPAN') {
                    target = target.closest('td');
                }
                const categoryTd = target.closest('td[data-category]');
                if (categoryTd && !categoryTd.parentNode.classList.contains('assigned')) {
                    const category = categoryTd.dataset.category;
                    assignScore(category);
                }
            });

            // Initialize the game on load
            initGame();
        });
    </script>
</body>
</html>
